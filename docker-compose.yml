services:
  mission-control:
    build: .
    container_name: mission-control
    ports:
      - "3002:3000"
    environment:
      - PORT=${PORT:-3000}
      - MC_COOKIE_SECURE=false
      - MC_COOKIE_SAMESITE=lax
      - MC_ALLOW_ANY_HOST=true
      - OPENCLAW_GATEWAY_HOST=host.docker.internal
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_TOKEN=198f103f7fe46a8a951aef395925ff25b669334d15695b11
    env_file:
      - path: .env
        required: false
    volumes:
      - mc-data:/app/.data
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 256
    networks:
      - mc-net
    restart: unless-stopped

volumes:
  mc-data:
    external: true
    name: mission-control_mc-data

networks:
  mc-net:
    driver: bridge
